<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>神隊友｜餐飲耗材補貨平台</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="brand-hero">
      <div class="hero-copy">
        <p class="eyebrow">餐飲耗材補貨平台</p>
        <h1>神隊友</h1>
        <p class="subtitle">餐飲老闆的靠山。</p>
        <p class="brand-line">熟悉的品牌，更好的價格。</p>
        <p class="brand-desc">不用犧牲品質，也能降低採購成本。</p>
        <div class="hero-tags">
          <span>價格透明</span>
          <span>快速配送</span>
          <span>一鍵補貨</span>
        </div>
      </div>
      <img class="hero-banner" src="images/hero-banner.png" alt="神隊友餐飲耗材補貨平台" />
    </header>

    <main>
      <section class="search-card">
        <input id="searchInput" type="search" placeholder="搜尋：餐盒、紙杯、吸管、手套、垃圾袋..." autocomplete="off" />
      </section>

      <section class="section-block">
        <div class="section-title">
          <h2>🔥 熱門補貨</h2>
          <button id="reloadBtn" class="text-btn">查看全部</button>
        </div>
        <div id="quickList" class="horizontal-list skeleton-row">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </section>

      <section class="section-block">
        <div class="section-title">
          <h2>商品分類</h2>
        </div>
        <div id="categoryList" class="category-list">
          <button class="category-chip active">載入中...</button>
        </div>
      </section>

      <section class="section-block last-section">
        <div class="section-title">
          <h2>全部耗材</h2>
          <span id="productTotal" class="muted">商品載入中...</span>
        </div>
        <div id="productGrid" class="product-grid">
          <div class="loading-box">
            <div class="loading-title">📦 耗材整理中</div>
            <div class="loading-desc">正在整理餐飲耗材與箱購價格<br>首次開啟約需數秒</div>
            <div class="loading-tip">請稍候一下，神隊友馬上到位 🚚</div>
          </div>
        </div>
      </section>
    </main>

    <button id="cartBtn" class="bottom-cart-bar" aria-label="補貨車">
      <div class="bottom-cart-left">
        <span class="cart-icon-wrap">🛒<span id="cartCount" class="cart-badge">0</span></span>
        <div>
          <strong>補貨車</strong>
          <small id="cartSummaryText">尚未加入商品</small>
        </div>
      </div>
      <div class="bottom-cart-right">
        <span id="bottomCartTotal">$0</span>
        <span class="bottom-cart-action">查看</span>
      </div>
    </button>

    <div id="cartDrawer" class="drawer hidden">
      <div class="drawer-mask" data-close="cart"></div>
      <div class="drawer-panel">
        <div class="drawer-head">
          <h2>補貨車</h2>
          <button class="icon-btn" data-close="cart">✕</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
          <div class="total-row"><span>採購小計</span><strong id="cartTotal">$0</strong></div>
          <div class="total-row reward-row"><span>本次預估回饋</span><strong id="cartRewardTotal">$0</strong></div>
          <button id="checkoutBtn" class="primary-btn">採購確認</button>
        </div>
      </div>
    </div>

    <div id="loginPage" class="checkout-page hidden">
      <div class="page-head">
        <button id="backFromLoginBtn" class="icon-btn">←</button>
        <h2>店家登入</h2>
      </div>
      <form id="loginForm" class="checkout-form">
        <label>店家帳號<input id="storeAccount" required placeholder="請輸入店家帳號" /></label>
        <label>店家密碼<input id="storePassword" required type="password" placeholder="請輸入店家密碼" /></label>
        <button id="loginBtn" class="primary-btn" type="submit">登入查看採購確認</button>
      </form>
    </div>

    <div id="confirmPage" class="checkout-page hidden">
      <div class="page-head">
        <button id="backFromConfirmBtn" class="icon-btn">←</button>
        <h2>採購確認</h2>
      </div>

      <section class="store-card">
        <p class="hello-text"><span id="bossGreeting">老闆您好</span> 👋</p>
        <div class="reward-stat">
          <span>目前本月回饋已累積</span>
          <strong id="monthlyRewardText">$0</strong>
        </div>
        <p id="storeInfoText" class="muted"></p>
      </section>

      <section class="order-summary">
        <h3>今天目前的採購車</h3>
        <div id="confirmItems"></div>
        <div class="total-row"><span>採購小計</span><strong id="confirmSubtotal">$0</strong></div>
        <div class="total-row reward-row"><span>本次預估回饋</span><strong id="confirmReward">$0</strong></div>
        <div class="total-row final-row"><span>送出後本月約累積</span><strong id="confirmMonthlyAfter">$0</strong></div>
      </section>

      <label class="note-label">備註（選填）<textarea id="orderNote" rows="3" placeholder="例如：下午三點後配送、請先電話聯絡"></textarea></label>
      <button id="submitOrderBtn" class="primary-btn" type="button">送出採購單</button>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script defer src="js/config.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
